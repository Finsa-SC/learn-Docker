services:
  db:
    image: postgres:15-alpine
    container_name: miko-db
    env_file:
      - .env
    volumes:
      - postgre_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${DB_USER} -d $${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-nw

  db_backup:
    image: prodrigestivill/postgres-backup-local:15-alpine-d257e5d
    depends_on:
      - db
    links:
      - db
    volumes:
      - ./pgbackups:/backups
      - /etc/localtime:/etc/localtime:ro
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
      - BACKUP_ON_START=TRUE
      - SCHEDULE=*/2 * * * *
      - BACKUP_KEEP_MINUTES=10
      - HEALTHCHECK_PORT=9001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9001/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - backend-nw

  backend:
    build: ./backend
    container_name: miko-backend
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - SECURITY_KEY=${SECURITY_KEY}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    networks:
      - backend-nw
      - frontend-nw

  web:
    image: nginx:alpine
    container_name: miko-web
    ports:
      - "${NGINX_PORT}:80"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - frontend-nw
volumes:
  postgre_data:
networks:
  frontend-nw:
    driver: bridge
  backend-nw:
    driver: bridge